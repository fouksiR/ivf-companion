<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melod·AI — Clinician Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --white: #ffffff;
            --off-white: #fafaf9;
            --warm-gray-50: #f5f4f2;
            --warm-gray-100: #eae8e4;
            --warm-gray-200: #d4d0ca;
            --warm-gray-300: #b8b2a8;
            --warm-gray-400: #9c9486;
            --warm-gray-500: #7a7268;
            --warm-gray-600: #5c564e;
            --warm-gray-700: #3e3a34;
            --warm-gray-800: #2a2722;
            --text-primary: #2a2722;
            --text-secondary: #7a7268;
            --text-muted: #9c9486;
            --green: #4a7c59;
            --green-bg: #eef5f0;
            --amber: #b8860b;
            --amber-bg: #fdf6e3;
            --red: #c44040;
            --red-bg: #fdf0f0;
            --red-pulse: #e85555;
            --blue: #4a6fa5;
            --blue-bg: #eef2f8;
            --coral: #d97563;
            --coral-bg: #f5e8e4;
            --purple: #7c5da1;
            --purple-bg: #f0e8f5;
            --border: #eae8e4;
            --shadow-sm: 0 1px 2px rgba(42,39,34,0.04);
            --shadow-md: 0 2px 8px rgba(42,39,34,0.06);
            --shadow-lg: 0 4px 16px rgba(42,39,34,0.08);
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Montserrat', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--off-white);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Header ─────────────────────────────── */
        .header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-family: var(--serif);
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 0.02em;
            color: var(--text-primary);
        }

        .logo span {
            color: var(--warm-gray-400);
        }

        .badge-clinician {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--blue);
            background: var(--blue-bg);
            padding: 4px 10px;
            border-radius: 4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
        }

        .status-dot.disconnected { background: var(--red); }

        .poll-info {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ── Alert Banner ───────────────────────── */
        .alert-banner {
            display: none;
            background: var(--red-bg);
            border-bottom: 2px solid var(--red);
            padding: 12px 32px;
            animation: alertPulse 2s ease-in-out infinite;
        }

        .alert-banner.active { display: flex; align-items: center; gap: 12px; }

        .alert-banner-icon {
            width: 32px;
            height: 32px;
            background: var(--red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            flex-shrink: 0;
        }

        .alert-banner-text {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: var(--red);
        }

        .alert-banner-time {
            font-weight: 400;
            color: var(--warm-gray-500);
        }

        @keyframes alertPulse {
            0%, 100% { background: var(--red-bg); }
            50% { background: #fbe8e8; }
        }

        /* ── Layout ─────────────────────────────── */
        .main {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 0;
            min-height: calc(100vh - 60px);
        }

        .panel-left {
            padding: 24px 32px;
            overflow-y: auto;
        }

        .panel-right {
            background: var(--white);
            border-left: 1px solid var(--border);
            padding: 24px;
            overflow-y: auto;
        }

        /* ── Section headers ────────────────────── */
        .section-title {
            font-family: var(--serif);
            font-size: 18px;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-count {
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--warm-gray-100);
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* ── Patient Cards ──────────────────────── */
        .patient-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .patient-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .patient-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--warm-gray-200);
        }

        .patient-card.level-RED {
            border-left: 3px solid var(--red);
        }

        .patient-card.level-AMBER {
            border-left: 3px solid var(--amber);
        }

        .patient-card.level-GREEN {
            border-left: 3px solid var(--green);
        }

        .patient-card.human-escalation {
            border-left: 3px solid var(--red);
            background: var(--red-bg);
            animation: cardPulse 3s ease-in-out infinite;
        }

        @keyframes cardPulse {
            0%, 100% { box-shadow: var(--shadow-sm); }
            50% { box-shadow: 0 0 0 2px rgba(196, 64, 64, 0.15), var(--shadow-md); }
        }

        .patient-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .patient-name {
            font-family: var(--serif);
            font-size: 17px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .escalation-badge {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 4px;
        }

        .escalation-badge.GREEN { color: var(--green); background: var(--green-bg); }
        .escalation-badge.AMBER { color: var(--amber); background: var(--amber-bg); }
        .escalation-badge.RED { color: var(--red); background: var(--red-bg); }

        .human-flag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--red);
            background: white;
            border: 1px solid var(--red);
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
            animation: flagBlink 1.5s ease-in-out infinite;
        }

        @keyframes flagBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .patient-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .patient-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .constructs-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .construct-tag {
            font-size: 11px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 3px;
            background: var(--warm-gray-100);
            color: var(--warm-gray-600);
        }

        .construct-tag.active {
            background: var(--amber-bg);
            color: var(--amber);
        }

        .construct-tag.critical {
            background: var(--red-bg);
            color: var(--red);
        }

        .patient-summary {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .checkin-sparkline {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 28px;
            margin-top: 10px;
        }

        .spark-bar {
            width: 6px;
            border-radius: 2px 2px 0 0;
            transition: height 0.3s;
        }

        .spark-bar.mood { background: var(--blue); opacity: 0.7; }
        .spark-bar.anxiety { background: var(--amber); opacity: 0.7; }
        .spark-bar.hope { background: var(--green); opacity: 0.7; }

        /* ── Right Panel: Alerts ────────────────── */
        .alert-feed-title {
            font-family: var(--serif);
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .unread-count {
            font-family: var(--sans);
            font-size: 11px;
            font-weight: 600;
            color: white;
            background: var(--red);
            padding: 1px 7px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }

        .alert-item {
            padding: 14px 16px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            background: var(--white);
            transition: background 0.2s;
        }

        .alert-item.unacknowledged {
            background: var(--warm-gray-50);
            border-color: var(--warm-gray-200);
        }

        .alert-item.human-escalation {
            background: var(--red-bg);
            border-color: var(--red);
        }

        .alert-type {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .alert-type.signal { color: var(--amber); }
        .alert-type.checkin { color: var(--blue); }
        .alert-type.human { color: var(--red); }

        .alert-message {
            font-size: 13px;
            color: var(--text-primary);
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .alert-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .alert-action {
            margin-top: 8px;
        }

        .btn-ack {
            font-family: var(--sans);
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--white);
            border: 1px solid var(--warm-gray-200);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-ack:hover {
            background: var(--warm-gray-50);
            border-color: var(--warm-gray-300);
        }

        .btn-contact {
            font-family: var(--sans);
            font-size: 11px;
            font-weight: 600;
            color: white;
            background: var(--red);
            border: none;
            padding: 5px 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 6px;
            transition: background 0.2s;
        }

        .btn-contact:hover { background: var(--red-pulse); }

        /* ── Detail Modal ───────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(42, 39, 34, 0.3);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--white);
            border-radius: 12px;
            width: 780px;
            max-width: 95vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            padding: 32px;
        }

        /* ── Phenotype Tabs ─────────────────────── */
        .pheno-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .pheno-tab {
            padding: 8px 16px;
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            transition: color 0.2s, border-color 0.2s;
        }
        .pheno-tab:hover { color: var(--text-primary); }
        .pheno-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--blue);
        }
        .pheno-panel { display: none; }
        .pheno-panel.active { display: block; }
        .pheno-chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .pheno-chart-box {
            background: var(--warm-gray-50);
            border-radius: 8px;
            padding: 14px;
        }
        .pheno-chart-box.full-width {
            grid-column: 1 / -1;
        }
        .pheno-chart-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .pheno-chart-box canvas {
            max-height: 200px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-family: var(--serif);
            font-size: 22px;
            font-weight: 400;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text-secondary);
            transition: background 0.2s;
        }

        .modal-close:hover { background: var(--warm-gray-50); }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .checkin-chart {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 60px;
            padding: 8px 0;
        }

        .chart-bar-group {
            display: flex;
            gap: 1px;
            align-items: flex-end;
        }

        .chart-bar {
            width: 8px;
            border-radius: 2px 2px 0 0;
            transition: height 0.3s;
        }

        /* ── Empty state ────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-state-text {
            font-family: var(--serif);
            font-size: 16px;
            color: var(--text-secondary);
        }

        .empty-state-sub {
            font-size: 13px;
            margin-top: 6px;
        }

        /* ── Config bar ─────────────────────────── */
        .config-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .config-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .config-input {
            font-family: var(--sans);
            font-size: 13px;
            padding: 6px 10px;
            border: 1px solid var(--warm-gray-200);
            border-radius: 4px;
            color: var(--text-primary);
            background: var(--white);
            width: 320px;
        }

        .config-input:focus {
            outline: none;
            border-color: var(--warm-gray-400);
        }

        .btn-connect {
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 500;
            color: var(--white);
            background: var(--text-primary);
            border: none;
            padding: 7px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-connect:hover { background: var(--warm-gray-700); }

        /* ── Pre-Consult Briefing ───────────────── */
        .briefing-section {
            background: var(--warm-gray-50);
            border-left: 4px solid var(--amber);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .briefing-title {
            font-family: var(--serif);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-primary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--warm-gray-200);
        }

        .briefing-divider {
            border: 0;
            height: 1px;
            background: var(--warm-gray-200);
            margin: 10px 0;
        }

        .briefing-row {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .briefing-label {
            font-weight: 600;
            color: var(--text-primary);
            min-width: 140px;
        }

        .comm-badge {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        .comm-badge.analytical { color: var(--blue); background: var(--blue-bg); }
        .comm-badge.emotional { color: var(--coral); background: var(--coral-bg); }
        .comm-badge.mixed { color: var(--purple); background: var(--purple-bg); }

        .stress-indicator {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stress-bar {
            width: 120px;
            height: 6px;
            background: var(--warm-gray-200);
            border-radius: 3px;
            overflow: hidden;
        }

        .stress-bar-fill {
            height: 100%;
            transition: width 0.3s;
        }

        .stress-bar-fill.low { width: 25%; background: var(--green); }
        .stress-bar-fill.moderate { width: 50%; background: var(--amber); }
        .stress-bar-fill.high { width: 75%; background: var(--red); }
        .stress-bar-fill.critical {
            width: 100%;
            background: var(--red-pulse);
            animation: stressPulse 1.5s ease-in-out infinite;
        }

        @keyframes stressPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .briefing-section-item {
            margin-bottom: 10px;
        }

        .briefing-section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .briefing-list {
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.5;
            margin-left: 16px;
        }

        .briefing-list li {
            list-style: none;
            margin-bottom: 4px;
        }

        .briefing-list li:before {
            content: "• ";
            color: var(--text-secondary);
            margin-right: 6px;
        }

        .briefing-approach {
            background: var(--white);
            border: 1px solid var(--warm-gray-200);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            color: var(--text-primary);
            font-style: italic;
            margin-bottom: 10px;
        }

        .briefing-prompt {
            background: #fffbf0;
            border-left: 3px solid var(--amber);
            border-radius: 4px;
            padding: 10px 12px;
            font-size: 13px;
            color: var(--text-primary);
            font-family: var(--serif);
            font-style: italic;
            margin-bottom: 10px;
        }

        .briefing-prompt:before {
            content: "💡 ";
            margin-right: 4px;
        }

        .briefing-topics {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .briefing-mood-trend {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .briefing-risk-flags {
            font-size: 12px;
            color: var(--red);
            margin-top: 6px;
        }

        .briefing-risk-flags-item {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 3px;
        }

        .briefing-error {
            background: var(--red-bg);
            border-left: 3px solid var(--red);
            border-radius: 4px;
            padding: 10px 12px;
            font-size: 12px;
            color: var(--red);
        }

        /* ── Communication style card badge ───── */
        .comm-style-mini {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.12em;
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
            margin-left: 6px;
        }

        .comm-style-mini.A { color: var(--blue); background: var(--blue-bg); }
        .comm-style-mini.E { color: var(--coral); background: var(--coral-bg); }
        .comm-style-mini.M { color: var(--purple); background: var(--purple-bg); }

        /* ── Responsive ─────────────────────────── */
        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; }
            .panel-right { border-left: none; border-top: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<div class="header">
    <div class="header-left">
        <div class="logo">Melod<span>·</span>AI</div>
        <div class="badge-clinician">Clinician</div>
    </div>
    <div class="header-right">
        <div class="connection-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting…</span>
        </div>
        <div class="poll-info" id="pollInfo"></div>
    </div>
</div>

<!-- ── Alert Banner (for human escalation) ────────────── -->
<div class="alert-banner" id="alertBanner">
    <div class="alert-banner-icon">!</div>
    <div class="alert-banner-text" id="alertBannerText"></div>
</div>

<!-- ── Main Layout ────────────────────────────────────── -->
<div class="main">
    <!-- Left: Patient List -->
    <div class="panel-left">
        <div class="config-bar">
            <span class="config-label">Backend URL</span>
            <input class="config-input" id="backendUrl" type="text" 
                   value="https://ivf-companion-532857641879.australia-southeast1.run.app"
                   placeholder="https://your-backend.run.app">
            <button class="btn-connect" onclick="startPolling()">Connect</button>
        </div>

        <div class="section-title">
            Patients
            <span class="section-count" id="patientCount">0</span>
        </div>

        <div class="patient-grid" id="patientGrid">
            <div class="empty-state">
                <div class="empty-state-icon">◌</div>
                <div class="empty-state-text">Waiting for connection</div>
                <div class="empty-state-sub">Enter your backend URL and click Connect</div>
            </div>
        </div>
    </div>

    <!-- Right: Alert Feed -->
    <div class="panel-right">
        <div class="alert-feed-title">
            Alerts
            <span class="unread-count" id="unreadCount" style="display: none;">0</span>
        </div>

        <div id="alertFeed">
            <div class="empty-state">
                <div class="empty-state-icon">○</div>
                <div class="empty-state-text">No alerts yet</div>
            </div>
        </div>
    </div>
</div>

<!-- ── Patient Detail Modal ───────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Patient Detail</div>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
let pollInterval = null;
let patients = [];
let alerts = [];
let connected = false;

const API = () => document.getElementById('backendUrl').value.replace(/\/+$/, '');

// ── Polling ────────────────────────────────────────────
function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    fetchData();
    pollInterval = setInterval(fetchData, 8000); // Poll every 8s
}

async function fetchData() {
    try {
        const [pRes, aRes] = await Promise.all([
            fetch(`${API()}/clinician/patients`),
            fetch(`${API()}/clinician/alerts?limit=30`)
        ]);
        
        if (!pRes.ok || !aRes.ok) throw new Error('API error');
        
        const pData = await pRes.json();
        const aData = await aRes.json();
        
        patients = pData.patients || [];
        alerts = aData.alerts || [];
        
        setConnected(true);
        renderPatients();
        renderAlerts();
        checkHumanEscalations();
        
        document.getElementById('pollInfo').textContent = 
            `Last: ${new Date().toLocaleTimeString()}`;
    } catch (err) {
        console.error('Poll failed:', err);
        setConnected(false);
    }
}

function setConnected(state) {
    connected = state;
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    if (state) {
        dot.classList.remove('disconnected');
        text.textContent = 'Connected';
    } else {
        dot.classList.add('disconnected');
        text.textContent = 'Disconnected';
    }
}

// ── Render Patients ────────────────────────────────────
function renderPatients() {
    const grid = document.getElementById('patientGrid');
    const count = document.getElementById('patientCount');
    count.textContent = patients.length;
    
    if (patients.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">◌</div>
                <div class="empty-state-text">No active patients</div>
                <div class="empty-state-sub">Patients will appear once they start using Melod·AI</div>
            </div>`;
        return;
    }
    
    grid.innerHTML = patients.map(p => {
        const isHuman = p.human_escalation_requested;
        const level = p.escalation_level || 'GREEN';
        const constructs = p.active_constructs || [];
        const ci = p.latest_checkin;
        const ciHistory = p.check_in_history_mini || []; // If available
        const commStyle = p.communication_style ? (p.communication_style === 'ANALYTICAL' ? 'A' :
            p.communication_style === 'EMOTIONAL' ? 'E' : 'M') : null;

        return `
        <div class="patient-card level-${level} ${isHuman ? 'human-escalation' : ''}"
             onclick="openDetail('${p.patient_id}')">
            <div class="patient-card-header">
                <div>
                    <span class="patient-name">${escHtml(p.patient_name || p.patient_id)}</span>
                    ${commStyle ? `<span class="comm-style-mini ${commStyle}">${commStyle}</span>` : ''}
                    ${isHuman ? '<span class="human-flag">⚡ HUMAN REQUESTED</span>' : ''}
                </div>
                <span class="escalation-badge ${level}">${level}</span>
            </div>
            
            <div class="patient-meta">
                <div class="patient-meta-item">
                    <span>Sessions: ${p.session_count || 0}</span>
                </div>
                <div class="patient-meta-item">
                    <span>Baseline: ${p.baseline_established ? '✓' : 'building…'}</span>
                </div>
                ${p.last_updated ? `<div class="patient-meta-item">
                    <span>Updated: ${timeAgo(p.last_updated)}</span>
                </div>` : ''}
            </div>
            
            ${constructs.length > 0 ? `
            <div class="constructs-row">
                ${constructs.map(c => `
                    <span class="construct-tag ${level === 'RED' ? 'critical' : 'active'}">
                        ${formatConstruct(c)}
                    </span>
                `).join('')}
            </div>` : ''}
            
            ${ci ? `
            <div style="display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">
                <span>Mood: <strong style="color: ${scoreColor(ci.mood, false)}">${ci.mood}</strong></span>
                <span>Anxiety: <strong style="color: ${scoreColor(ci.anxiety, true)}">${ci.anxiety}</strong></span>
                <span>Hope: <strong style="color: ${scoreColor(ci.hope, false)}">${ci.hope}</strong></span>
                <span>Loneliness: <strong style="color: ${scoreColor(ci.loneliness, true)}">${ci.loneliness}</strong></span>
            </div>` : ''}
            
            <div class="patient-summary">${escHtml(p.summary || '')}</div>
        </div>`;
    }).join('');
}

// ── Render Alerts ──────────────────────────────────────
function renderAlerts() {
    const feed = document.getElementById('alertFeed');
    const badge = document.getElementById('unreadCount');
    const unack = alerts.filter(a => !a.acknowledged).length;
    
    if (unack > 0) {
        badge.style.display = 'inline';
        badge.textContent = unack;
    } else {
        badge.style.display = 'none';
    }
    
    if (alerts.length === 0) {
        feed.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">○</div>
                <div class="empty-state-text">No alerts yet</div>
            </div>`;
        return;
    }
    
    feed.innerHTML = alerts.map((a, i) => {
        const isHuman = a.type === 'human_escalation';
        const typeLabel = {
            'signal_alert': 'Signal Alert',
            'checkin_alert': 'Check-in Alert',
            'human_escalation': 'Human Requested'
        }[a.type] || a.type;
        const typeClass = {
            'signal_alert': 'signal',
            'checkin_alert': 'checkin',
            'human_escalation': 'human'
        }[a.type] || '';
        
        let message = '';
        if (isHuman) {
            message = `<strong>${escHtml(a.patient_name || a.patient_id)}</strong> is requesting to speak with someone.`;
            if (a.reason) message += ` Reason: "${escHtml(a.reason)}"`;
        } else if (a.type === 'checkin_alert') {
            const s = a.scores || {};
            message = `<strong>${escHtml(a.patient_id)}</strong> — ${escHtml(a.summary || '')}`;
            if (s.mood) message += ` (mood: ${s.mood}, anxiety: ${s.anxiety})`;
        } else {
            message = `<strong>${escHtml(a.patient_id)}</strong> — ${escHtml(a.summary || '')}`;
        }
        
        return `
        <div class="alert-item ${!a.acknowledged ? 'unacknowledged' : ''} ${isHuman ? 'human-escalation' : ''}">
            <div class="alert-type ${typeClass}">${typeLabel}</div>
            <div class="alert-message">${message}</div>
            <div class="alert-time">${timeAgo(a.timestamp)}</div>
            <div class="alert-action">
                ${!a.acknowledged ? `<button class="btn-ack" onclick="ackAlert(${i}); event.stopPropagation();">Acknowledge</button>` : ''}
                ${isHuman ? `<button class="btn-contact" onclick="contactPatient('${a.patient_id}'); event.stopPropagation();">Contact</button>` : ''}
            </div>
        </div>`;
    }).join('');
}

// ── Human escalation banner ────────────────────────────
function checkHumanEscalations() {
    const banner = document.getElementById('alertBanner');
    const bannerText = document.getElementById('alertBannerText');
    
    const humanAlerts = alerts.filter(a => a.type === 'human_escalation' && !a.acknowledged);
    if (humanAlerts.length > 0) {
        const latest = humanAlerts[0];
        bannerText.innerHTML = `
            <strong>${escHtml(latest.patient_name || latest.patient_id)}</strong> 
            is requesting human support 
            <span class="alert-banner-time">— ${timeAgo(latest.timestamp)}</span>
        `;
        banner.classList.add('active');
    } else {
        banner.classList.remove('active');
    }
}

// ── Actions ────────────────────────────────────────────
async function ackAlert(index) {
    try {
        await fetch(`${API()}/clinician/alerts/${index}/acknowledge`, { method: 'POST' });
        alerts[index].acknowledged = true;
        renderAlerts();
        checkHumanEscalations();
    } catch (err) {
        console.error('Ack failed:', err);
    }
}

function contactPatient(patientId) {
    // For now, open WhatsApp or phone — customize per clinic
    // In future: in-app messaging
    alert(`Opening contact for patient ${patientId}.\n\nIn production this would trigger a secure messaging channel or phone call.`);
}

function renderBriefingSection(briefing) {
    if (!briefing) {
        return `
        <div class="briefing-section">
            <div class="briefing-error">Briefing unavailable</div>
        </div>`;
    }

    const commStyle = briefing.communication_style || 'MIXED';
    const stressLevel = briefing.stress_level || 'MODERATE';

    // Map to lowercase for CSS
    const commStyleLower = commStyle === 'ANALYTICAL' ? 'analytical' :
        commStyle === 'EMOTIONAL' ? 'emotional' : 'mixed';
    const stressLevelLower = stressLevel.toLowerCase();

    let html = `
    <div class="briefing-section">
        <div class="briefing-title">Pre-Consult Briefing</div>
        <div style="margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--warm-gray-200);">
            <div class="briefing-row">
                <span class="briefing-label">Communication Style:</span>
                <span class="comm-badge ${commStyleLower}">${commStyle}</span>
            </div>
            <div class="briefing-row">
                <span class="briefing-label">Stress Level:</span>
                <div class="stress-indicator">
                    <div class="stress-bar">
                        <div class="stress-bar-fill ${stressLevelLower}"></div>
                    </div>
                    <span style="min-width: 70px;">${stressLevel}</span>
                </div>
            </div>
        </div>`;

    // Main Concerns
    if (briefing.main_concerns && briefing.main_concerns.length > 0) {
        html += `
        <div class="briefing-section-item">
            <div class="briefing-section-label">Main Concerns</div>
            <ul class="briefing-list">
                ${briefing.main_concerns.map(c => `<li>${escHtml(c)}</li>`).join('')}
            </ul>
        </div>`;
    }

    // Suggested Approach
    if (briefing.suggested_approach) {
        html += `
        <div class="briefing-approach">
            ${escHtml(briefing.suggested_approach)}
        </div>`;
    }

    // Opening question
    if (briefing.opening_question) {
        html += `
        <div class="briefing-prompt">
            Ask the patient: &quot;${escHtml(briefing.opening_question)}&quot;
        </div>`;
    }

    // Recent Topics
    if (briefing.recent_topics && briefing.recent_topics.length > 0) {
        html += `
        <div class="briefing-section-item">
            <div class="briefing-section-label">Recent Topics</div>
            <div class="briefing-topics">${escHtml(briefing.recent_topics.join(', '))}</div>
        </div>`;
    }

    // Mood Trend
    if (briefing.mood_trend) {
        const trendSymbol = briefing.mood_trend === 'declining' ? '↓' :
            briefing.mood_trend === 'improving' ? '↑' : '→';
        html += `
        <div class="briefing-mood-trend">
            <span class="briefing-section-label">Mood Trend:</span>
            <span>${escHtml(briefing.mood_trend)} ${trendSymbol}</span>
        </div>`;
    }

    // Risk Flags
    if (briefing.risk_flags && briefing.risk_flags.length > 0) {
        html += `
        <div class="briefing-risk-flags">
            <div class="briefing-section-label" style="color: var(--red);">Risk Flags</div>
            ${briefing.risk_flags.map(f => `
                <div class="briefing-risk-flags-item">
                    <span>⚠</span>
                    <span>${escHtml(f)}</span>
                </div>
            `).join('')}
        </div>`;
    }

    html += `
    </div>`;

    return html;
}

async function openDetail(patientId) {
    const modal = document.getElementById('modalOverlay');
    const title = document.getElementById('modalTitle');
    const body = document.getElementById('modalBody');

    // Find patient name from patients array
    const patient = patients.find(p => p.patient_id === patientId) || {};
    const patientName = patient.patient_name || patientId;
    const treatmentStage = patient.treatment_stage || 'Unknown';
    const cycleNumber = patient.cycle_number || 1;

    title.textContent = `${patientName} — Cycle ${cycleNumber} (${treatmentStage})`;
    body.innerHTML = '<p style="color: var(--text-muted);">Loading…</p>';
    modal.classList.add('active');

    try {
        // Fetch patient data and briefing in parallel
        const [res, briefingRes] = await Promise.all([
            fetch(`${API()}/clinician/patient/${patientId}`),
            fetch(`${API()}/clinician/patient/${patientId}/briefing`).catch(() => null)
        ]);

        const data = await res.json();
        const briefingData = briefingRes && briefingRes.ok ? await briefingRes.json() : null;

        const assessment = data.current_assessment || {};
        const constructs = assessment.constructs || {};
        const checkIns = data.check_in_history || [];

        let html = '';

        // Pre-Consult Briefing section
        if (briefingData) {
            html += renderBriefingSection(briefingData);
        }

        // Escalation
        html += `
        <div class="detail-section">
            <div class="detail-label">Escalation Level</div>
            <span class="escalation-badge ${data.escalation_level}">${data.escalation_level}</span>
            ${data.human_escalation_requested ?
                `<span class="human-flag" style="margin-left: 8px;">⚡ HUMAN REQUESTED at ${data.human_escalation_at || 'unknown'}</span>` : ''}
        </div>`;
        
        // Assessment summary
        html += `
        <div class="detail-section">
            <div class="detail-label">Assessment Summary</div>
            <p style="font-size: 14px; color: var(--text-primary);">${escHtml(assessment.summary || 'No assessment yet')}</p>
        </div>`;
        
        // Active constructs
        if (Object.keys(constructs).length > 0) {
            html += `
            <div class="detail-section">
                <div class="detail-label">Active Constructs</div>
                ${Object.entries(constructs).map(([name, info]) => `
                    <div style="display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border);">
                        <span style="font-size: 13px; font-weight: 500;">${formatConstruct(name)}</span>
                        <span style="font-size: 12px; color: var(--text-muted);">
                            ${info.signal || ''} ${info.z_score ? `(z=${info.z_score})` : ''}
                        </span>
                    </div>
                `).join('')}
            </div>`;
        }
        
        // Check-in history chart
        if (checkIns.length > 0) {
            html += `
            <div class="detail-section">
                <div class="detail-label">Check-in History (last ${checkIns.length})</div>
                <div class="checkin-chart">
                    ${checkIns.map(ci => `
                        <div class="chart-bar-group" title="M:${ci.mood} A:${ci.anxiety} H:${ci.hope}">
                            <div class="chart-bar" style="height: ${ci.mood * 6}px; background: var(--blue); opacity: 0.7;"></div>
                            <div class="chart-bar" style="height: ${ci.anxiety * 6}px; background: var(--amber); opacity: 0.7;"></div>
                            <div class="chart-bar" style="height: ${ci.hope * 6}px; background: var(--green); opacity: 0.7;"></div>
                        </div>
                    `).join('')}
                </div>
                <div style="display: flex; gap: 16px; margin-top: 6px; font-size: 11px; color: var(--text-muted);">
                    <span style="display: flex; align-items: center; gap: 4px;"><span style="width:8px;height:8px;background:var(--blue);border-radius:2px;display:inline-block;"></span> Mood</span>
                    <span style="display: flex; align-items: center; gap: 4px;"><span style="width:8px;height:8px;background:var(--amber);border-radius:2px;display:inline-block;"></span> Anxiety</span>
                    <span style="display: flex; align-items: center; gap: 4px;"><span style="width:8px;height:8px;background:var(--green);border-radius:2px;display:inline-block;"></span> Hope</span>
                </div>
            </div>`;
        }
        
        // Meta
        html += `
        <div class="detail-section" style="display: flex; gap: 24px; font-size: 12px; color: var(--text-muted);">
            <span>Sessions: ${data.session_count || 0}</span>
            <span>Baseline: ${data.baseline_established ? 'Established' : 'Building'}</span>
            <span>Signals logged: ${data.signal_history_count || 0}</span>
        </div>`;
        
        // ── Phenotype Trends Tab ──
        html += `
        <div class="detail-section">
            <div class="pheno-tabs">
                <button class="pheno-tab active" onclick="switchPhenoTab(this, 'tab-overview')">Overview</button>
                <button class="pheno-tab" onclick="switchPhenoTab(this, 'tab-trends')">Phenotype Trends</button>
            </div>

            <div class="pheno-panel active" id="tab-overview">
                <!-- existing content already rendered above -->
            </div>

            <div class="pheno-panel" id="tab-trends">
                <div id="phenoChartsContainer">
                    <p style="color: var(--text-muted); font-size: 13px;">Loading phenotype data…</p>
                </div>
            </div>
        </div>`;

        body.innerHTML = html;

        // Move existing detail sections into overview tab
        const overviewTab = document.getElementById('tab-overview');
        const allSections = body.querySelectorAll('.detail-section');
        // Move all sections except the last one (which contains the tabs) into the overview tab
        for (let i = 0; i < allSections.length - 1; i++) {
            overviewTab.appendChild(allSections[i]);
        }

        // Load phenotype chart data in background
        loadPhenotypeCharts(patientId);

    } catch (err) {
        body.innerHTML = `<p style="color: var(--red);">Failed to load patient data: ${err.message}</p>`;
    }
}

function switchPhenoTab(btn, panelId) {
    btn.closest('.pheno-tabs').querySelectorAll('.pheno-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    btn.closest('.detail-section').querySelectorAll('.pheno-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(panelId).classList.add('active');
}

let phenoCharts = [];

async function loadPhenotypeCharts(patientId) {
    const container = document.getElementById('phenoChartsContainer');
    try {
        const res = await fetch(`${API()}/clinician/patient/${patientId}/phenotype-history?days=30`);
        if (!res.ok) throw new Error('Failed to fetch phenotype history');
        const data = await res.json();

        const snapshots = data.snapshots || [];
        const checkins = data.checkins || [];

        if (snapshots.length === 0 && checkins.length === 0) {
            container.innerHTML = '<p style="color: var(--text-muted); font-size: 13px;">No phenotype data collected yet. Data will appear after the patient uses the app.</p>';
            return;
        }

        // Destroy old charts
        phenoCharts.forEach(c => c.destroy());
        phenoCharts = [];

        container.innerHTML = `
            <div class="pheno-chart-row">
                <div class="pheno-chart-box">
                    <div class="pheno-chart-title">Mood &amp; Hope</div>
                    <canvas id="chartMoodHope"></canvas>
                </div>
                <div class="pheno-chart-box">
                    <div class="pheno-chart-title">Anxiety &amp; Uncertainty</div>
                    <canvas id="chartAnxiety"></canvas>
                </div>
            </div>
            <div class="pheno-chart-row">
                <div class="pheno-chart-box">
                    <div class="pheno-chart-title">Typing Biomarkers</div>
                    <canvas id="chartTyping"></canvas>
                </div>
                <div class="pheno-chart-box">
                    <div class="pheno-chart-title">Sleep Pattern</div>
                    <canvas id="chartSleep"></canvas>
                </div>
            </div>
            <div class="pheno-chart-row">
                <div class="pheno-chart-box full-width">
                    <div class="pheno-chart-title">Escalation Timeline</div>
                    <canvas id="chartEscalation" style="max-height:100px;"></canvas>
                </div>
            </div>`;

        const chartDefaults = {
            responsive: true,
            maintainAspectRatio: true,
            plugins: { legend: { labels: { font: { family: "'Montserrat', sans-serif", size: 10 }, boxWidth: 10 } } },
            scales: { x: { ticks: { font: { size: 9 }, maxRotation: 45 } }, y: { ticks: { font: { size: 9 } } } }
        };

        // ── Chart 1: Mood & Hope (from check-ins) ──
        const ciDates = checkins.map(c => (c.date || '').substring(5, 16));
        const moods = checkins.map(c => c.mood);
        const hopes = checkins.map(c => c.hope);
        phenoCharts.push(new Chart(document.getElementById('chartMoodHope'), {
            type: 'line',
            data: {
                labels: ciDates,
                datasets: [
                    { label: 'Mood', data: moods, borderColor: '#2D8E8E', backgroundColor: 'rgba(45,142,142,0.1)', fill: true, tension: 0.3, pointRadius: 3, borderWidth: 2 },
                    { label: 'Hope', data: hopes, borderColor: '#D4A843', backgroundColor: 'rgba(212,168,67,0.1)', fill: true, tension: 0.3, pointRadius: 3, borderWidth: 2 }
                ]
            },
            options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { min: 0, max: 10, ticks: { font: { size: 9 }, stepSize: 2 } } } }
        }));

        // ── Chart 2: Anxiety & Uncertainty ──
        const anxieties = checkins.map(c => c.anxiety);
        const uncertainties = checkins.map(c => c.uncertainty);
        phenoCharts.push(new Chart(document.getElementById('chartAnxiety'), {
            type: 'line',
            data: {
                labels: ciDates,
                datasets: [
                    { label: 'Anxiety', data: anxieties, borderColor: '#E07A5F', backgroundColor: 'rgba(224,122,95,0.1)', fill: true, tension: 0.3, pointRadius: 3, borderWidth: 2 },
                    { label: 'Uncertainty', data: uncertainties, borderColor: '#7c5da1', backgroundColor: 'rgba(124,93,161,0.1)', fill: true, tension: 0.3, pointRadius: 3, borderWidth: 2 }
                ]
            },
            options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { min: 0, max: 10, ticks: { font: { size: 9 }, stepSize: 2 } } } }
        }));

        // ── Chart 3: Typing Biomarkers (dual-axis) ──
        const sDates = snapshots.map(s => (s.timestamp || '').substring(5, 16));
        const typingSpeeds = snapshots.map(s => (s.derived_features || {}).typing_speed_ms || null);
        const deletionRatios = snapshots.map(s => {
            const dr = (s.derived_features || {}).deletion_ratio;
            return dr != null ? Math.round(dr * 100) : null;
        });
        phenoCharts.push(new Chart(document.getElementById('chartTyping'), {
            type: 'line',
            data: {
                labels: sDates,
                datasets: [
                    { label: 'Typing Speed (ms)', data: typingSpeeds, borderColor: '#2D8E8E', backgroundColor: 'transparent', tension: 0.3, pointRadius: 2, borderWidth: 2, yAxisID: 'y' },
                    { label: 'Deletion Ratio (%)', data: deletionRatios, borderColor: '#E07A5F', backgroundColor: 'transparent', tension: 0.3, pointRadius: 2, borderWidth: 2, yAxisID: 'y1' }
                ]
            },
            options: {
                ...chartDefaults,
                scales: {
                    x: chartDefaults.scales.x,
                    y: { type: 'linear', position: 'left', title: { display: true, text: 'ms', font: { size: 9 } }, ticks: { font: { size: 9 } } },
                    y1: { type: 'linear', position: 'right', title: { display: true, text: '%', font: { size: 9 } }, ticks: { font: { size: 9 } }, grid: { drawOnChartArea: false } }
                }
            }
        }));

        // ── Chart 4: Sleep Pattern (scatter — session hours) ──
        const sleepData = snapshots.map(s => {
            const df = s.derived_features || {};
            return { x: (s.timestamp || '').substring(0, 10), y: df.session_hour, isLate: df.is_late_night };
        }).filter(d => d.y != null);
        const normalPts = sleepData.filter(d => !d.isLate);
        const latePts = sleepData.filter(d => d.isLate);
        phenoCharts.push(new Chart(document.getElementById('chartSleep'), {
            type: 'scatter',
            data: {
                datasets: [
                    { label: 'Normal', data: normalPts.map(d => ({ x: d.x, y: d.y })), backgroundColor: '#2D8E8E', pointRadius: 5 },
                    { label: 'Late Night', data: latePts.map(d => ({ x: d.x, y: d.y })), backgroundColor: '#c44040', pointRadius: 6, pointStyle: 'triangle' }
                ]
            },
            options: {
                ...chartDefaults,
                scales: {
                    x: { type: 'category', labels: [...new Set(sleepData.map(d => d.x))], ticks: { font: { size: 9 }, maxRotation: 45 } },
                    y: { min: 0, max: 24, title: { display: true, text: 'Hour', font: { size: 9 } }, ticks: { font: { size: 9 }, stepSize: 4 } }
                }
            }
        }));

        // ── Chart 5: Escalation Timeline (horizontal band) ──
        const escLevelMap = { GREEN: 0, AMBER: 1, RED: 2 };
        const escColors = { GREEN: '#4a7c59', AMBER: '#b8860b', RED: '#c44040' };
        const escDates = snapshots.map(s => (s.timestamp || '').substring(5, 16));
        const escValues = snapshots.map(s => escLevelMap[s.escalation_level] != null ? escLevelMap[s.escalation_level] : 0);
        const escBgColors = snapshots.map(s => escColors[s.escalation_level] || escColors.GREEN);
        phenoCharts.push(new Chart(document.getElementById('chartEscalation'), {
            type: 'bar',
            data: {
                labels: escDates,
                datasets: [{
                    label: 'Escalation',
                    data: escValues.map(() => 1),
                    backgroundColor: escBgColors,
                    borderWidth: 0,
                    barPercentage: 1.0,
                    categoryPercentage: 1.0
                }]
            },
            options: {
                ...chartDefaults,
                indexAxis: 'x',
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { font: { size: 8 }, maxRotation: 45 } },
                    y: { display: false, max: 1 }
                }
            }
        }));

    } catch (err) {
        container.innerHTML = `<p style="color: var(--red); font-size: 13px;">Failed to load phenotype data: ${err.message}</p>`;
    }
}

function closeModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('modalOverlay').classList.remove('active');
}

// ── Utilities ──────────────────────────────────────────
function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}

function timeAgo(ts) {
    if (!ts) return '';
    const diff = (Date.now() - new Date(ts).getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return `${Math.floor(diff / 86400)}d ago`;
}

function formatConstruct(c) {
    return (c || '').replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
}

function scoreColor(val, inverted) {
    // For mood/hope (higher = better): low is red, high is green
    // For anxiety/loneliness (higher = worse): high is red, low is green
    if (inverted) {
        if (val >= 8) return 'var(--red)';
        if (val >= 6) return 'var(--amber)';
        return 'var(--green)';
    } else {
        if (val <= 3) return 'var(--red)';
        if (val <= 5) return 'var(--amber)';
        return 'var(--green)';
    }
}

// ── Keyboard shortcut ──────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal(e);
});

// ── Auto-start ─────────────────────────────────────────
window.addEventListener('load', () => {
    // Try to connect immediately
    startPolling();
});
</script>
