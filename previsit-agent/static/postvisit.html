<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>How was your visit?</title>
  <meta http-equiv="Cache-Control" content="no-store, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --white:#ffffff;
      --text:rgba(255,255,255,0.98);
      --text-soft:rgba(255,255,255,0.88);
      --text-muted:rgba(255,255,255,0.62);
      --line:rgba(255,255,255,0.45);
      --pill:999px;
      --radius:28px;
      --sans:"Outfit",-apple-system,BlinkMacSystemFont,sans-serif;
      --serif:"Cormorant Garamond","Times New Roman",serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
    html{scroll-behavior:smooth}
    html,body{min-height:100%}

    body{
      font-family:var(--sans);color:var(--text);
      display:flex;justify-content:center;
      background:
        linear-gradient(180deg,
          rgba(136,162,178,0.55) 0%,
          rgba(136,162,178,0.38) 35%,
          rgba(136,162,178,0.18) 60%,
          rgba(136,162,178,0.30) 100%),
        url("https://images.unsplash.com/photo-1517483000871-1dbf64a6e1c6?auto=format&fit=crop&w=3000&q=90")
        center 60% / cover no-repeat fixed;
    }

    .app{width:100%;max-width:430px;min-height:100vh;min-height:100dvh;position:relative}
    .shell{position:relative;z-index:2;min-height:100vh;min-height:100dvh;padding:24px 22px 28px;display:flex;flex-direction:column}

    /* Brand chip (swap text for the base64 logo lockup used on the other screens) */
    .brand{align-self:center;margin-bottom:6px;padding:7px 16px;border-radius:var(--pill);
      background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.30);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-soft);font-weight:300}

    .screen{display:none;flex:1;animation:fade .4s ease}
    .screen.active{display:flex}
    @keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    .rule{width:100%;height:1px;background:var(--line);margin:18px 0}

    /* Rating screen — single step */
    .rate-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 6px;
      background:radial-gradient(ellipse at center, rgba(60,85,110,0.35) 0%, transparent 70%);
      border-radius:20px;
    }
    .q-title{
      text-align:center;font-size:1.22rem;line-height:1.6;color:var(--white);font-weight:400;
      margin:0 auto 6px;max-width:24ch;
      text-shadow:0 2px 14px rgba(30,50,70,0.55), 0 0 30px rgba(60,90,120,0.25);
    }
    .q-sub{text-align:center;font-size:.88rem;line-height:1.7;color:var(--text-soft);font-weight:300;max-width:30ch;margin:0 auto 26px;text-shadow:0 1px 8px rgba(50,70,90,0.35)}

    .stars{display:flex;justify-content:center;gap:4px;margin:0 0 8px}
    .star-btn{
      appearance:none;border:none;background:none;cursor:pointer;
      font-size:2.5rem;line-height:1;padding:4px 6px;
      color:rgba(255,255,255,0.28);
      transition:color .15s,transform .15s,text-shadow .15s;
    }
    .star-btn:hover{transform:scale(1.1)}
    .star-btn:focus-visible{outline:none}
    .star-btn.on{
      color:var(--white);
      text-shadow:0 0 18px rgba(255,255,255,0.55), 0 2px 8px rgba(40,70,100,0.35);
    }
    .scale-legend{display:flex;justify-content:space-between;padding:0 10px;margin:0 auto 26px}
    .scale-legend span{font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--text-muted);font-weight:300}

    .comment{
      width:100%;max-width:340px;margin:0 auto;display:block;
      background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.28);
      border-radius:18px;color:var(--white);font-family:var(--sans);
      font-size:.95rem;line-height:1.6;font-weight:300;padding:14px 16px;min-height:92px;resize:vertical;outline:none;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:border-color .2s;
    }
    .comment::placeholder{color:var(--text-muted)}
    .comment:focus{border-color:rgba(255,255,255,0.62)}

    .cta-row{display:flex;justify-content:center;margin-top:24px}
    .button{
      appearance:none;border:1px solid rgba(255,255,255,0.50);
      background:rgba(255,255,255,0.15);color:var(--white);font-family:var(--sans);
      padding:14px 28px;border-radius:var(--pill);cursor:pointer;
      font-size:.76rem;text-transform:uppercase;letter-spacing:.26em;font-weight:300;
      transition:background .2s,border-color .2s,transform .16s,opacity .2s;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      text-shadow:0 1px 4px rgba(50,70,90,0.25);text-decoration:none;display:inline-block;
    }
    .button:hover,.button:focus-visible{outline:none;background:rgba(255,255,255,0.25);border-color:rgba(255,255,255,0.72);transform:translateY(-1px)}
    .button[disabled]{opacity:.34;cursor:default;transform:none}

    /* Thank-you screen */
    .panel-wrap{display:flex;align-items:center;justify-content:center;flex:1}
    .panel{
      width:100%;border-radius:var(--radius);
      border:1px solid rgba(255,255,255,0.24);
      background:linear-gradient(180deg, rgba(120,150,170,0.28), rgba(140,170,190,0.16));
      box-shadow:0 24px 48px rgba(40,70,100,0.12);padding:30px 20px 26px;
      backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);text-align:center;
    }
    .panel .lead{font-family:var(--serif);font-size:1.7rem;font-weight:300;color:var(--white);margin:4px 0 8px;text-shadow:0 1px 8px rgba(50,70,90,0.30)}
    .bodycopy{max-width:31ch;margin:0 auto;color:var(--text-soft);font-size:.95rem;line-height:1.85;font-weight:300}
    .status{margin-top:16px;font-size:.85rem;color:var(--text-soft);min-height:1.2em}
    #googleWrap{margin-top:22px;display:none}

    .brandmark{position:absolute;right:16px;bottom:calc(16px + env(safe-area-inset-bottom,0px));z-index:5;
      background:rgba(255,255,255,0.92);border-radius:12px;padding:5px 9px;
      box-shadow:0 6px 18px rgba(30,50,70,0.20);}
    .brandmark img{display:block;width:112px;height:auto}
    @media(max-width:390px){.brandmark img{width:96px}}
    @media(max-width:390px){
      .shell{padding-left:16px;padding-right:16px}
      .q-title{font-size:1.08rem}
      .star-btn{font-size:2.1rem;padding:4px}
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">

      <!-- Single step: rating + optional comment -->
      <section class="screen active" id="screen-rate">
        <div class="rate-wrap">
          <div class="rule"></div>
          <h1 class="q-title">How was your experience with us?</h1>
          <p class="q-sub">Your feedback helps us care for you better.</p>
          <div class="stars" id="stars" role="radiogroup" aria-label="Experience rating"></div>
          <div class="scale-legend"><span>Not great</span><span>Excellent</span></div>
          <textarea class="comment" id="comment" rows="3" placeholder="Anything you'd like to share? (optional)"></textarea>
          <div class="cta-row"><button class="button" id="sendBtn" disabled>Send →</button></div>
        </div>
      </section>

      <!-- Thank you -->
      <section class="screen" id="screen-done">
        <div class="panel-wrap">
          <div class="panel">
            <div class="rule"></div>
            <p class="lead">Thank you</p>
            <p class="bodycopy">We're grateful you took a moment to share this with us.</p>
            <div class="rule"></div>
            <div id="googleWrap">
              <p class="bodycopy" style="margin-bottom:14px">If you'd be happy to, you can also share your experience on Google.</p>
              <a class="button" id="googleBtn" target="_blank" rel="noopener">Leave a Google review →</a>
            </div>
            <div class="status" id="status"></div>
          </div>
        </div>
      </section>
    </div>

    <script>
      const TOKEN = "{{TOKEN}}";
      const GOOGLE_ENABLED = {{GOOGLE_ENABLED}};
      const GOOGLE_URL = "{{GOOGLE_URL}}";

      const screens = { rate: document.getElementById("screen-rate"), done: document.getElementById("screen-done") };
      const starsEl = document.getElementById("stars");
      const sendBtn = document.getElementById("sendBtn");
      const commentEl = document.getElementById("comment");
      const statusEl = document.getElementById("status");
      let rating = 0;
      let submitting = false;

      function showScreen(n){ Object.values(screens).forEach(e=>e.classList.remove("active")); screens[n].classList.add("active"); window.scrollTo({top:0}); }

      function paint(){
        starsEl.querySelectorAll(".star-btn").forEach((b,i)=>{ b.classList.toggle("on", (i+1) <= rating); });
      }
      for (let v=1; v<=5; v++){
        const b = document.createElement("button");
        b.type = "button"; b.className = "star-btn"; b.textContent = "★";
        b.setAttribute("role","radio"); b.setAttribute("aria-label", v + " star" + (v>1?"s":""));
        b.addEventListener("click", () => { rating = v; paint(); sendBtn.disabled = false; });
        starsEl.appendChild(b);
      }

      async function submit(){
        if (submitting || rating < 1) return;
        submitting = true;
        sendBtn.disabled = true;
        showScreen("done");
        statusEl.textContent = "Saving your feedback…";
        try {
          const r = await fetch("/api/review/" + TOKEN, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ rating: rating, comment: commentEl.value.trim() })
          });
          const data = await r.json().catch(()=>({}));
          if (r.ok){
            statusEl.textContent = "";
            if (data.show_google && data.google_url){
              document.getElementById("googleBtn").href = data.google_url;
              document.getElementById("googleWrap").style.display = "block";
            }
          } else {
            statusEl.textContent = "Something went wrong: " + (data.detail || r.status);
            submitting = false;
          }
        } catch(e){
          statusEl.textContent = "Network error — your feedback may not have been saved.";
          submitting = false;
        }
      }

      sendBtn.addEventListener("click", submit);
    </script>
